<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Command Center</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                colors: {
                    'slate': {
                        '50': '#f8fafc',
                        '100': '#f1f5f9',
                        '200': '#e2e8f0',
                        '300': '#cbd5e1',
                        '400': '#94a3b8',
                        '500': '#64748b',
                        '600': '#475569',
                        '700': '#334155',
                        '800': '#1e293b',
                        '900': '#0f172a',
                    },
                    'red': { '400': '#f87171', '500': '#ef4444', '600': '#dc2626' },
                    'orange': { '500': '#f97316', '600': '#ea580c' },
                    'yellow': { '400': '#facc15', '500': '#eab308', '600': '#ca8a04' },
                    'green': { '400': '#4ade80', '500': '#22c55e', '600': '#16a34a' },
                    'blue': { '400': '#60a5fa', '500': '#3b82f6', '600': '#2563eb' },
                    'violet': { '500': '#8b5cf6', '600': '#7c3aed' },
                    'cyan': { '500': '#06b6d4', '600': '#0891b2' },
                },
            }
        }
    </script>

    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .dashboard-container {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            min-height: 100vh;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #475569;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.1);
        }

        .card-header {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .kpi-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .kpi-change {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .kpi-change.positive {
            color: #22c55e;
        }

        .kpi-change.negative {
            color: #ef4444;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background-color: #22c55e;
        }

        .status-indicator.disconnected {
            background-color: #ef4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .sparkline {
            width: 100%;
            height: 30px;
            margin-top: 0.5rem;
        }

        .timeline-event {
            display: flex;
            padding: 0.75rem;
            border-left: 3px solid #334155;
            transition: all 0.2s ease;
        }

        .timeline-event:hover {
            background-color: rgba(139, 92, 246, 0.1);
            border-left-color: #8b5cf6;
        }

        .severity-critical { color: #ef4444; }
        .severity-high { color: #f97316; }
        .severity-medium { color: #eab308; }
        .severity-low { color: #22c55e; }
        .severity-info { color: #3b82f6; }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-critical {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .badge-high {
            background-color: rgba(249, 115, 22, 0.2);
            color: #fb923c;
        }

        .badge-medium {
            background-color: rgba(234, 179, 8, 0.2);
            color: #facc15;
        }

        .badge-low {
            background-color: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .badge-info {
            background-color: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .skeleton {
            background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .chart-container {
            width: 100%;
            height: 300px;
        }

        .recharts-wrapper {
            outline: none;
        }

        .recharts-text {
            fill: #94a3b8;
            font-size: 12px;
        }

        .recharts-cartesian-axis-tick {
            fill: #94a3b8;
        }

        .recharts-tooltip-wrapper {
            outline: none;
        }

        .custom-tooltip {
            background-color: #0f172a !important;
            border: 1px solid #334155 !important;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .custom-tooltip-label {
            color: #f1f5f9;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .custom-tooltip-item {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .expand-button {
            background: none;
            border: none;
            color: #8b5cf6;
            cursor: pointer;
            padding: 0.25rem;
            transition: all 0.2s ease;
        }

        .expand-button:hover {
            color: #a78bfa;
        }

        .detail-row {
            background-color: rgba(139, 92, 246, 0.05);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            border-left: 3px solid #8b5cf6;
        }

        .grid-cell {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 0.75rem;
            border-radius: 0.25rem;
            text-align: center;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const {
            LineChart, Line, AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
            RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
        } = Recharts;

        // Mock data generator
        const generateMockData = () => ({
            summary: {
                total_events_24h: 45230,
                critical_findings: 12,
                guardrail_violations: 87,
                ai_cost: 3456.78,
                auth_blocks: 234,
                avg_risk_score: 7.4,
                total_events_delta: 12.5,
                critical_findings_delta: -8.3,
                guardrail_violations_delta: 23.1,
                ai_cost_delta: 5.7,
                auth_blocks_delta: -15.2,
                risk_score_delta: -2.1
            },
            findings_by_severity: [
                { name: 'Critical', value: 45, fill: '#ef4444' },
                { name: 'High', value: 128, fill: '#f97316' },
                { name: 'Medium', value: 342, fill: '#eab308' },
                { name: 'Low', value: 1205, fill: '#22c55e' }
            ],
            findings_by_provider: [
                { provider: 'AWS', findings: 456, value: 456 },
                { provider: 'Azure', findings: 234, value: 234 },
                { provider: 'GCP', findings: 189, value: 189 },
                { provider: 'Kubernetes', findings: 345, value: 345 },
                { provider: 'GitHub', findings: 123, value: 123 }
            ],
            events_over_time: [
                { time: '00:00', 'API_CALL': 245, 'POLICY_VIOLATION': 89, 'DATA_ACCESS': 134, 'CONFIG_CHANGE': 56 },
                { time: '01:00', 'API_CALL': 312, 'POLICY_VIOLATION': 124, 'DATA_ACCESS': 167, 'CONFIG_CHANGE': 78 },
                { time: '02:00', 'API_CALL': 189, 'POLICY_VIOLATION': 67, 'DATA_ACCESS': 98, 'CONFIG_CHANGE': 45 },
                { time: '03:00', 'API_CALL': 456, 'POLICY_VIOLATION': 198, 'DATA_ACCESS': 267, 'CONFIG_CHANGE': 123 },
                { time: '04:00', 'API_CALL': 534, 'POLICY_VIOLATION': 234, 'DATA_ACCESS': 312, 'CONFIG_CHANGE': 156 },
                { time: '05:00', 'API_CALL': 612, 'POLICY_VIOLATION': 267, 'DATA_ACCESS': 389, 'CONFIG_CHANGE': 189 },
                { time: '06:00', 'API_CALL': 678, 'POLICY_VIOLATION': 301, 'DATA_ACCESS': 423, 'CONFIG_CHANGE': 212 }
            ],
            cost_by_provider: [
                { provider: 'AWS', detection: 890, response: 234, prevention: 567 },
                { provider: 'Azure', detection: 456, response: 123, prevention: 289 },
                { provider: 'GCP', detection: 345, response: 89, prevention: 178 },
                { provider: 'Kubernetes', detection: 234, response: 67, prevention: 145 }
            ],
            threat_signals: [
                { category: 'TOR', value: 45 },
                { category: 'Datacenter', value: 78 },
                { category: 'VPN', value: 56 },
                { category: 'Impossible Travel', value: 23 },
                { category: 'Branching', value: 34 }
            ],
            auth_volume: [
                { time: '00:00', ALLOW: 1200, STEP_UP: 450, BLOCK: 120, REVOKE: 45 },
                { time: '04:00', ALLOW: 1456, STEP_UP: 567, BLOCK: 145, REVOKE: 67 },
                { time: '08:00', ALLOW: 1890, STEP_UP: 678, BLOCK: 234, REVOKE: 89 },
                { time: '12:00', ALLOW: 2345, STEP_UP: 834, BLOCK: 289, REVOKE: 112 },
                { time: '16:00', ALLOW: 2156, STEP_UP: 756, BLOCK: 267, REVOKE: 98 },
                { time: '20:00', ALLOW: 1678, STEP_UP: 589, BLOCK: 178, REVOKE: 67 },
                { time: '23:00', ALLOW: 1234, STEP_UP: 456, BLOCK: 123, REVOKE: 45 }
            ],
            timeline_events: [
                { id: 1, timestamp: '2026-04-03T14:32:15Z', severity: 'critical', product: 'CSPM', title: 'Unencrypted S3 bucket detected', description: 'S3 bucket prod-backups lacks encryption', source: 'aws-prod' },
                { id: 2, timestamp: '2026-04-03T14:28:42Z', severity: 'high', product: 'AI', title: 'Unusual API usage pattern', description: 'Spike in LLM API calls detected from IP 203.0.113.42', source: 'api-gateway' },
                { id: 3, timestamp: '2026-04-03T14:25:09Z', severity: 'high', product: 'Identity', title: 'Multiple failed auth attempts', description: 'User john@example.com blocked after 5 failed attempts', source: 'auth-service' },
                { id: 4, timestamp: '2026-04-03T14:21:33Z', severity: 'medium', product: 'CSPM', title: 'IAM policy drift detected', description: 'Role prod-lambda differs from baseline policy', source: 'iam-audit' },
                { id: 5, timestamp: '2026-04-03T14:18:07Z', severity: 'low', product: 'AI', title: 'Guardrail triggered', description: 'PII detection in LLM response filtered', source: 'llm-gateway' }
            ],
            compound_risk_users: [
                { user: 'alice@example.com', cspm_count: 3, ai_count: 2, identity_count: 1, compound_score: 8.9, last_event: '2026-04-03T14:32:15Z' },
                { user: 'bob@example.com', cspm_count: 1, ai_count: 4, identity_count: 2, compound_score: 7.6, last_event: '2026-04-03T14:28:42Z' },
                { user: 'charlie@example.com', cspm_count: 2, ai_count: 1, identity_count: 3, compound_score: 6.8, last_event: '2026-04-03T14:25:09Z' }
            ]
        });

        // API fetch with mock fallback
        const fetchData = async (endpoint) => {
            try {
                const response = await fetch(`/api/dashboard/${endpoint}`, {
                    timeout: 5000,
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Failed to fetch ${endpoint}, using mock data:`, error.message);
                return null;
            }
        };

        // KPI Card Component
        const KPICard = ({ label, value, delta, icon, trend }) => {
            const isPositive = delta >= 0;
            const deltaLabel = `${isPositive ? '↑' : '↓'} ${Math.abs(delta).toFixed(1)}%`;

            return (
                <div className="card flex-1 min-w-fit">
                    <div className="card-header">{label}</div>
                    <div className="flex items-end justify-between">
                        <div>
                            <div className="kpi-value">{value}</div>
                            <div className={`kpi-change ${isPositive ? 'positive' : 'negative'}`}>
                                {deltaLabel}
                            </div>
                        </div>
                        <div className="ml-4">{icon}</div>
                    </div>
                </div>
            );
        };

        // Loading Skeleton
        const LoadingSkeleton = ({ count = 1 }) => (
            <>
                {[...Array(count)].map((_, i) => (
                    <div key={i} className="card skeleton h-32"></div>
                ))}
            </>
        );

        // Custom Tooltip
        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="custom-tooltip">
                        <div className="custom-tooltip-label">{label}</div>
                        {payload.map((entry, index) => (
                            <div key={index} className="custom-tooltip-item" style={{ color: entry.color }}>
                                {entry.name}: {typeof entry.value === 'number' ? entry.value.toLocaleString() : entry.value}
                            </div>
                        ))}
                    </div>
                );
            }
            return null;
        };

        // Timeline Event Component
        const TimelineEvent = ({ event, expanded, onToggle }) => {
            const severityClass = `severity-${event.severity}`;
            const badgeClass = `badge-${event.severity}`;

            return (
                <div key={event.id} className="timeline-event">
                    <button
                        onClick={() => onToggle(event.id)}
                        className="expand-button"
                    >
                        {expanded ? '▼' : '▶'}
                    </button>
                    <div className="flex-1 ml-3">
                        <div className="flex items-center gap-2 mb-2">
                            <span className={`badge ${badgeClass}`}>{event.severity}</span>
                            <span className="badge" style={{ background: 'rgba(139, 92, 246, 0.2)', color: '#c4b5fd' }}>
                                {event.product}
                            </span>
                            <span className="text-xs text-slate-400 ml-auto">
                                {new Date(event.timestamp).toLocaleTimeString()}
                            </span>
                        </div>
                        <div className="font-medium text-slate-100 mb-1">{event.title}</div>
                        {expanded && (
                            <div className="detail-row">
                                <div className="text-sm text-slate-300 mb-2">{event.description}</div>
                                <div className="text-xs text-slate-400">
                                    <strong>Source:</strong> {event.source}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Main Dashboard Component
        const Dashboard = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [timeRange, setTimeRange] = useState('24h');
            const [autoRefresh, setAutoRefresh] = useState('30s');
            const [connected, setConnected] = useState(false);
            const [lastRefresh, setLastRefresh] = useState(new Date());
            const [expandedEvents, setExpandedEvents] = useState(new Set());
            const refreshIntervalRef = useRef(null);

            // Load data
            const loadData = useCallback(async () => {
                const mockData = generateMockData();
                setData(mockData);
                setConnected(true);
                setLastRefresh(new Date());
                setLoading(false);
            }, []);

            // Initial load
            useEffect(() => {
                loadData();
            }, [loadData]);

            // Auto-refresh
            useEffect(() => {
                if (refreshIntervalRef.current) {
                    clearInterval(refreshIntervalRef.current);
                }

                if (autoRefresh !== 'off') {
                    const interval = parseInt(autoRefresh) * 1000;
                    refreshIntervalRef.current = setInterval(loadData, interval);
                }

                return () => {
                    if (refreshIntervalRef.current) {
                        clearInterval(refreshIntervalRef.current);
                    }
                };
            }, [autoRefresh, loadData]);

            const toggleEventExpand = (eventId) => {
                const newExpanded = new Set(expandedEvents);
                if (newExpanded.has(eventId)) {
                    newExpanded.delete(eventId);
                } else {
                    newExpanded.add(eventId);
                }
                setExpandedEvents(newExpanded);
            };

            if (loading || !data) {
                return <LoadingSkeleton count={6} />;
            }

            const formatTime = (date) => {
                return date.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            };

            return (
                <div className="dashboard-container">
                    {/* Top Bar */}
                    <div className="sticky top-0 z-10 border-b border-slate-700 bg-slate-900/95 backdrop-blur-md">
                        <div className="max-w-[1920px] mx-auto px-6 py-4">
                            <div className="flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500 to-cyan-500 flex items-center justify-center font-bold text-white">
                                        ∆
                                    </div>
                                    <h1 className="text-2xl font-bold text-slate-100">Aegis Command Center</h1>
                                </div>

                                <div className="flex items-center gap-6">
                                    {/* Time Range */}
                                    <div className="flex gap-2">
                                        {['1h', '6h', '24h', '7d', '30d'].map(range => (
                                            <button
                                                key={range}
                                                onClick={() => setTimeRange(range)}
                                                className={`px-3 py-1 rounded text-sm font-medium transition ${
                                                    timeRange === range
                                                        ? 'bg-violet-600 text-white'
                                                        : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                                                }`}
                                            >
                                                {range}
                                            </button>
                                        ))}
                                    </div>

                                    {/* Auto Refresh */}
                                    <div className="flex gap-2">
                                        {['5s', '15s', '30s', 'off'].map(interval => (
                                            <button
                                                key={interval}
                                                onClick={() => setAutoRefresh(interval)}
                                                className={`px-3 py-1 rounded text-sm font-medium transition ${
                                                    autoRefresh === interval
                                                        ? 'bg-cyan-600 text-white'
                                                        : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                                                }`}
                                            >
                                                {interval}
                                            </button>
                                        ))}
                                    </div>

                                    {/* Status */}
                                    <div className="flex items-center text-sm text-slate-300">
                                        <span className={`status-indicator ${connected ? 'connected' : 'disconnected'}`}></span>
                                        {connected ? 'Connected' : 'Disconnected'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-[1920px] mx-auto px-6 py-6 space-y-6">
                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-6 gap-4">
                            <KPICard
                                label="Total Events (24h)"
                                value={data.summary.total_events_24h.toLocaleString()}
                                delta={data.summary.total_events_delta}
                                icon="📊"
                            />
                            <KPICard
                                label="Critical Findings"
                                value={data.summary.critical_findings}
                                delta={data.summary.critical_findings_delta}
                                icon="🔴"
                            />
                            <KPICard
                                label="Guardrail Violations"
                                value={data.summary.guardrail_violations}
                                delta={data.summary.guardrail_violations_delta}
                                icon="⚠️"
                            />
                            <KPICard
                                label="AI Cost"
                                value={`$${data.summary.ai_cost.toLocaleString('en-US', { maximumFractionDigits: 2 })}`}
                                delta={data.summary.ai_cost_delta}
                                icon="💰"
                            />
                            <KPICard
                                label="Auth Blocks"
                                value={data.summary.auth_blocks}
                                delta={data.summary.auth_blocks_delta}
                                icon="🚫"
                            />
                            <KPICard
                                label="Avg Risk Score"
                                value={data.summary.avg_risk_score.toFixed(1)}
                                delta={data.summary.risk_score_delta}
                                icon="📈"
                            />
                        </div>

                        {/* Security Posture */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Findings by Severity */}
                            <div className="card">
                                <div className="card-header">Findings by Severity</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <PieChart>
                                        <Pie
                                            data={data.findings_by_severity}
                                            cx="50%"
                                            cy="50%"
                                            innerRadius={60}
                                            outerRadius={100}
                                            paddingAngle={2}
                                            dataKey="value"
                                        >
                                            {data.findings_by_severity.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.fill} />
                                            ))}
                                        </Pie>
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>

                            {/* Findings by Provider */}
                            <div className="card">
                                <div className="card-header">Findings by Provider</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <BarChart
                                        data={data.findings_by_provider}
                                        layout="vertical"
                                        margin={{ top: 5, right: 30, left: 100, bottom: 5 }}
                                    >
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                        <XAxis type="number" stroke="#94a3b8" />
                                        <YAxis dataKey="provider" type="category" stroke="#94a3b8" width={90} />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Bar dataKey="findings" fill="#8b5cf6" radius={[0, 8, 8, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* AI Telemetry */}
                        <div className="space-y-6">
                            {/* Events Over Time */}
                            <div className="card">
                                <div className="card-header">Events Over Time</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <AreaChart data={data.events_over_time} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorAPICall" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorPolicyViolation" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#ef4444" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#ef4444" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorDataAccess" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#22c55e" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#22c55e" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorConfigChange" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#f97316" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#f97316" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                        <XAxis dataKey="time" stroke="#94a3b8" />
                                        <YAxis stroke="#94a3b8" />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend />
                                        <Area type="monotone" dataKey="API_CALL" stackId="1" stroke="#3b82f6" fillOpacity={1} fill="url(#colorAPICall)" />
                                        <Area type="monotone" dataKey="POLICY_VIOLATION" stackId="1" stroke="#ef4444" fillOpacity={1} fill="url(#colorPolicyViolation)" />
                                        <Area type="monotone" dataKey="DATA_ACCESS" stackId="1" stroke="#22c55e" fillOpacity={1} fill="url(#colorDataAccess)" />
                                        <Area type="monotone" dataKey="CONFIG_CHANGE" stackId="1" stroke="#f97316" fillOpacity={1} fill="url(#colorConfigChange)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>

                            {/* Cost by Provider */}
                            <div className="card">
                                <div className="card-header">Cost by Provider</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <BarChart data={data.cost_by_provider} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                        <XAxis dataKey="provider" stroke="#94a3b8" />
                                        <YAxis stroke="#94a3b8" />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend />
                                        <Bar dataKey="detection" stackId="a" fill="#3b82f6" radius={[8, 8, 0, 0]} />
                                        <Bar dataKey="response" stackId="a" fill="#f97316" radius={[8, 8, 0, 0]} />
                                        <Bar dataKey="prevention" stackId="a" fill="#22c55e" radius={[8, 8, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Identity & Auth */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Auth Volume by Tier */}
                            <div className="card">
                                <div className="card-header">Auth Volume by Tier</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <AreaChart data={data.auth_volume} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorAllow" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#22c55e" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#22c55e" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorStepUp" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#eab308" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#eab308" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorBlock" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#ef4444" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#ef4444" stopOpacity={0}/>
                                            </linearGradient>
                                            <linearGradient id="colorRevoke" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#8b5cf6" stopOpacity={0.8}/>
                                                <stop offset="95%" stopColor="#8b5cf6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                        <XAxis dataKey="time" stroke="#94a3b8" />
                                        <YAxis stroke="#94a3b8" />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend />
                                        <Area type="monotone" dataKey="ALLOW" stackId="1" stroke="#22c55e" fillOpacity={1} fill="url(#colorAllow)" />
                                        <Area type="monotone" dataKey="STEP_UP" stackId="1" stroke="#eab308" fillOpacity={1} fill="url(#colorStepUp)" />
                                        <Area type="monotone" dataKey="BLOCK" stackId="1" stroke="#ef4444" fillOpacity={1} fill="url(#colorBlock)" />
                                        <Area type="monotone" dataKey="REVOKE" stackId="1" stroke="#8b5cf6" fillOpacity={1} fill="url(#colorRevoke)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>

                            {/* Threat Signals */}
                            <div className="card">
                                <div className="card-header">Threat Signal Breakdown</div>
                                <ResponsiveContainer width="100%" height={300}>
                                    <RadarChart data={data.threat_signals} margin={{ top: 20, right: 40, bottom: 20, left: 40 }}>
                                        <PolarGrid stroke="#334155" />
                                        <PolarAngleAxis dataKey="category" stroke="#94a3b8" />
                                        <PolarRadiusAxis stroke="#94a3b8" />
                                        <Radar name="Count" dataKey="value" stroke="#8b5cf6" fill="#8b5cf6" fillOpacity={0.5} />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Legend />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Unified Timeline */}
                        <div className="card">
                            <div className="card-header">Unified Timeline</div>
                            <div className="space-y-1">
                                {data.timeline_events.map(event => (
                                    <TimelineEvent
                                        key={event.id}
                                        event={event}
                                        expanded={expandedEvents.has(event.id)}
                                        onToggle={toggleEventExpand}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* Compound Risk Users */}
                        <div className="card">
                            <div className="card-header">Compound Risk Users</div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-slate-700">
                                            <th className="text-left px-4 py-3 text-slate-400 font-semibold">User</th>
                                            <th className="text-center px-4 py-3 text-slate-400 font-semibold">CSPM</th>
                                            <th className="text-center px-4 py-3 text-slate-400 font-semibold">AI</th>
                                            <th className="text-center px-4 py-3 text-slate-400 font-semibold">Identity</th>
                                            <th className="text-center px-4 py-3 text-slate-400 font-semibold">Risk Score</th>
                                            <th className="text-left px-4 py-3 text-slate-400 font-semibold">Last Event</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.compound_risk_users.map(user => (
                                            <tr key={user.user} className="border-b border-slate-800 hover:bg-slate-800/50 transition">
                                                <td className="px-4 py-3 text-slate-100 font-medium">{user.user}</td>
                                                <td className="text-center px-4 py-3">
                                                    <span className="badge badge-high">{user.cspm_count}</span>
                                                </td>
                                                <td className="text-center px-4 py-3">
                                                    <span className="badge badge-medium">{user.ai_count}</span>
                                                </td>
                                                <td className="text-center px-4 py-3">
                                                    <span className="badge badge-info">{user.identity_count}</span>
                                                </td>
                                                <td className="text-center px-4 py-3">
                                                    <span className={`font-bold ${user.compound_score >= 8 ? 'text-red-400' : user.compound_score >= 6 ? 'text-orange-400' : 'text-yellow-400'}`}>
                                                        {user.compound_score.toFixed(1)}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 text-slate-400 text-xs">
                                                    {new Date(user.last_event).toLocaleString()}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Status Bar Footer */}
                    <div className="sticky bottom-0 border-t border-slate-700 bg-slate-900/95 backdrop-blur-md">
                        <div className="max-w-[1920px] mx-auto px-6 py-3">
                            <div className="flex items-center justify-between text-xs text-slate-400">
                                <span className="flex items-center gap-2">
                                    <span className={`status-indicator ${connected ? 'connected' : 'disconnected'}`}></span>
                                    {connected ? 'Connected to ClickHouse' : 'Disconnected from ClickHouse'}
                                </span>
                                <span>Last refresh: {formatTime(lastRefresh)}</span>
                                <span>Dashboard v4.0</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
