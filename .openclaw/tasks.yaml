# OpenClaw Task Queue — Aegis
# Tasks are picked up by the OpenClaw engineering bot.
# Claude creates tasks during sessions. OpenClaw works them autonomously on feature branches.
# Status: pending | in_progress | pr_opened | review | completed | blocked
# Priority: p0 (critical path) | p1 (high value) | p2 (standard) | p3 (nice to have)

tasks:

  # ============================================================
  # ROUND 1 — Scanner Expansion + Tests + Finding Dedup
  # These tasks have no dependencies and can start immediately.
  # ============================================================

  - id: azure-scanner-expansion
    phase: "1"
    priority: p0
    type: pattern-replicate
    template: modules/scanners/aws/scanner.py
    description: >
      Expand modules/scanners/azure/scanner.py from 2 checks to match the
      depth of the AWS scanner. Follow the exact pattern in aws/scanner.py:
      each check is a method that returns a list of Finding objects with
      severity, resource_id, details, and remediation fields.
      Add the following checks:
      1. Key Vault: check for soft-delete enabled, purge protection, network ACLs
      2. SQL Database: check for transparent data encryption, firewall rules allowing 0.0.0.0
      3. Managed Disk Encryption: check for encryption at rest on all disks
      4. App Service: check for minimum TLS version (1.2), HTTPS-only, managed identity
      5. Virtual Network: check for NSG association on all subnets
      6. Storage Account: check for HTTPS-only, minimum TLS 1.2, encryption scope
      Use azure-mgmt-* SDK. Each check must have detailed remediation hints.
    output: modules/scanners/azure/scanner.py
    tests: tests/test_azure_scanner.py
    branch: feature/azure-scanner-expansion
    status: pending
    assigned: openclaw

  - id: gcp-scanner-expansion
    phase: "1"
    priority: p0
    type: pattern-replicate
    template: modules/scanners/aws/scanner.py
    description: >
      Expand modules/scanners/gcp/scanner.py from 1 check to match the
      depth of the AWS scanner. Follow the exact pattern in aws/scanner.py.
      Add the following checks:
      1. Compute Engine: default service account usage, public IP on instances,
         serial port access, OS Login enforcement
      2. Cloud Storage: public bucket access, uniform bucket-level ACL,
         encryption (CMEK vs Google-managed)
      3. Cloud SQL: public IP enabled, SSL enforcement, authorized networks
      4. IAM: overly permissive service account roles (roles/owner, roles/editor
         on service accounts), user-managed service account keys
      5. VPC: default network usage, legacy network presence
      6. Logging: audit logging enabled on all services
      Use google-cloud-* SDK. Each check must have remediation hints.
    output: modules/scanners/gcp/scanner.py
    tests: tests/test_gcp_scanner.py
    branch: feature/gcp-scanner-expansion
    status: pending
    assigned: openclaw

  - id: unit-tests-network-scanner
    phase: "1"
    priority: p1
    type: test-generation
    description: >
      Generate unit tests for modules/scanners/network/scanner.py.
      Test nmap-based scanning with mocked nmap output.
      Test socket fallback mode when nmap is unavailable.
      Test dangerous port detection for all listed dangerous ports.
      Test finding generation format matches base.Finding dataclass.
      Test timeout and error handling.
      Use pytest. Mock subprocess calls for nmap and socket connections.
    output: tests/test_network_scanner.py
    branch: feature/tests-network-scanner
    status: pending
    assigned: openclaw

  - id: unit-tests-aws-scanner
    phase: "1"
    priority: p1
    type: test-generation
    description: >
      Generate unit tests for modules/scanners/aws/scanner.py.
      Test each check independently: S3 Block Public Access, S3 ACLs,
      EC2 security groups, IAM root MFA, IAM root access keys,
      CloudTrail status, RDS public accessibility.
      Mock boto3 client responses for each service.
      Test error handling when AWS credentials are missing.
      Test finding severity and remediation text accuracy.
      Use pytest with moto or manual boto3 mocks.
    output: tests/test_aws_scanner.py
    branch: feature/tests-aws-scanner
    status: pending
    assigned: openclaw

