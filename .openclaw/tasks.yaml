  - id: iptables-persistence
    phase: "1"
    priority: p2
    type: feature
    description: >
      Fix modules/agents/network_agent.py so iptables rules persist
      across container/host reboots. After any iptables rule is applied:
      1. Save rules to /etc/iptables/rules.v4 using iptables-save
      2. Add a startup script that loads rules via iptables-restore
      3. Update Dockerfile to install iptables-persistent
      4. Add input validation: reject private IPs in block_ip() to
         prevent admin lockout. Reject port 22 in close_port() with
         a force flag required to override.
    output: modules/agents/network_agent.py
    tests: tests/test_network_agent.py
    branch: feature/iptables-persistence
    status: pending
    assigned: openclaw

