  - id: finding-deduplication
    phase: "1"
    priority: p1
    type: feature
    description: >
      Add finding deduplication to modules/scanners/base.py.
      When the same resource_id + finding type combination is detected in
      consecutive scans, suppress duplicates and instead update the
      existing finding's last_seen timestamp.
      Add a dedup_key property to the Finding dataclass: hash of
      (scanner_type, resource_id, title, severity).
      Add a FindingStore class that tracks seen findings and returns
      only new or changed findings per scan cycle.
      This prevents N identical findings from flooding OpenSearch.
    output: modules/scanners/base.py
    tests: tests/test_finding_dedup.py
    branch: feature/finding-deduplication
    status: pending
    assigned: openclaw

