      Test KeyRotator (decrypt old, encrypt new).
      Test HMAC integrity check.
      Test each KEK provider: env var, AWS KMS (mocked), Azure Key Vault (mocked).
      Use pytest. Mock cloud SDK calls.
    output: tests/test_encryption.py
    branch: feature/tests-encryption
    status: pending
